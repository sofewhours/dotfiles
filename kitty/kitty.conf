# Kitty minimal config with transparency and keybinds

# Font
font_family Hack Nerd Font Mono
bold_font yes
font_size 12.5

# Background opacity (transparency)
background_opacity 0.6

# Cursor style
cursor_shape beam
cursor_blink yes

# Tabs: hide if only one tab
tabs_hide_when_only_one yes

# Keybindings

# Close current window (no confirmation in kitty)
map ctrl+w close_window

# Move focus between panes
map ctrl+h focus_left
map ctrl+l focus_right
map ctrl+k focus_up
map ctrl+j focus_down

# Split panes
map ctrl+, split_window_horizontal
map ctrl+. split_window_vertical

# Resize panes (kitty default increments)
map ctrl+shift+h resize_window_left
map ctrl+shift+j resize_window_down
map ctrl+shift+k resize_window_up
map ctrl+shift+l resize_window_right



# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME